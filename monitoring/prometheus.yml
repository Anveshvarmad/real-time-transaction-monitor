global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "transaction-api"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "transaction-api:8000"

  - job_name: "transaction-worker"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "transaction-worker:9100"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"
