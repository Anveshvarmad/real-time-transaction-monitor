services:
  postgres:
    image: postgres:16-alpine
    container_name: transaction-postgres
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
      POSTGRES_DB: transaction_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d transaction_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transaction-redis
    ports:
      - "6379:6379"

  transaction-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: transaction-api
    environment:
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      TRANSACTION_QUEUE: transactions:incoming
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  transaction-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: transaction-worker
    environment:
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      TRANSACTION_QUEUE: transactions:incoming
      DATABASE_URL: postgresql+psycopg://monitor:monitor@postgres:5432/transaction_monitor
      WORKER_METRICS_PORT: 9100
      PYTHONPATH: /app
    ports:
      - "9100:9100"
    volumes:
      - type: bind
        source: ./output
        target: /app/output
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  transaction-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: transaction-dashboard
    environment:
      DATABASE_URL: postgresql+psycopg://monitor:monitor@postgres:5432/transaction_monitor
      PYTHONPATH: /app
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      transaction-worker:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: transaction-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - type: bind
        source: ./monitoring/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
    ports:
      - "9090:9090"
    depends_on:
      - transaction-api
      - transaction-worker

volumes:
  postgres-data:
